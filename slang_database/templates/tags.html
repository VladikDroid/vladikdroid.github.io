{% extends "base.html" %}

{% block title %}Теги - Сленг.ру{% endblock %}

{% block content %}
<div class="word-detail-container">
    <h2 class="mb-4" style="color: var(--primary-color);"><i class="bi bi-tags"></i> Все теги</h2>

    <div class="word-detail-card">
        <div class="d-flex flex-wrap gap-2">
            {% for tag in tags %}
            <a href="{{ url_for('tag_words', tag_name=tag.name) }}" 
               class="badge text-decoration-none p-3" 
               style="background-color: {{ tag.color or '#6c757d' }} !important; 
                      color: #fff !important;
                      font-size: 0.9rem; 
                      font-weight: 600;">
                {{ tag.name }}
            </a>
            {% else %}
            <p class="text-muted">Теги пока не добавлены</p>
            {% endfor %}
        </div>
    </div>

    <div class="mt-4 text-center">
        <a href="{{ url_for('search') }}" class="btn btn-outline-primary">
            <i class="bi bi-search"></i> Поиск слов
        </a>
        <a href="{{ url_for('statistics') }}" class="btn btn-outline-secondary ms-2">
            <i class="bi bi-bar-chart"></i> Статистика
        </a>
    </div>
</div>
{% endblock %}
